{% extends 'base.html' %}
{% load staticfiles %}
{% load i18n %}

{% block header %}
{% endblock header %}

{% block styles_base %}
<style>
</style>
{% endblock styles_base %}

{% block nucleocentral %}
    <div id="id_editor"></div>
{% endblock nucleocentral %}

{% block footer %}
{% endblock footer %}

{% block scripts %}
    <script src="{% static 'tinymce/js/tinymce/tinymce.min.js' %}"></script>
    <script>
        var param = window.location.search.substring(1);
        var nota_id = param.substring(0, 6);
        var btn_grabar = param.substring(6);
        if (btn_grabar == 'no_btn_grabar') { btn_grabar = false; } else { btn_grabar = true; }

        var height = Math.max($(document).height(), $(window).height()) - 110;

        tinymce.PluginManager.add('btn_grabar', function(editor, url) {
            editor.addButton('btn_grabar', {
                text: 'Grabar',
                icon: false,
                onclick: function() {
                    var texto = editor.getContent();
                    var url = '/getdatos_ajax/graba_nota_texto';
                    var param = {nota_id: nota_id, texto: texto};
                    funcionAjax(url, param, function(data){
                        tinymce.activeEditor.notificationManager.open({
                           text: 'Documento guardado.',
                           type: 'succes'
                        });
                    });
                }
            });
        });

        tinymce.PluginManager.add('btn_adjuntos', function(editor, url) {
            editor.addButton('btn_adjuntos', {
                text: 'Adjuntos',
                icon: false,
                onclick: function() {
                    parent.MuestraAdjuntos(nota_id);
                }
            });
        });

        if (btn_grabar) {
            var plugins = 'btn_grabar btn_adjuntos';
            var toolbar = 'btn_grabar btn_adjuntos undo redo | styleselect | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image';
        } else {
            var plugins = 'btn_adjuntos';
            var toolbar = 'btn_adjuntos undo redo | styleselect | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image';
        }

        tinymce.init({
            selector:'#id_editor',
           // auto_focus: 'id_editor',
            branding: false,
            elementpath: false,
            height: height,
            resize: false,
            language: 'es',
            browser_spellcheck: true,
            plugins: plugins,
            toolbar: toolbar,
        });

        if (typeof parent.editorGetContent !== 'undefined') {
            const editorGetContent = new Function('return tinymce.activeEditor.getContent();');
            parent.editorGetContent = editorGetContent;
        }

        $(document).ready(function(){
            setTimeout(function(){
                var url = '/getdatos_ajax/lee_nota_texto';
                var param = {nota_id: nota_id};
                funcionAjax(url, param, function(data){
                    tinymce.activeEditor.setContent(data);
                });

            }, 200);
        });
    </script>
{% endblock scripts %}
